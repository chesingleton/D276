<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Career Goals</title>
    <link rel="stylesheet" href="Master.css">
</head>
<body>
    <header>
        <h1>Che Singleton</h1>
        <h4>Web Developer</h4>
        <nav>
            <a href="Resume.html">Resume</a>
            <a href="Cover-Letter.html">Cover Letter</a>
        </nav>
    </header>
    <hr>
    <main>
        <div class="container">
            <form action="https://wp.zybooks.com/form-viewer.php">
                <input type="text" name="firstName" id="firstName" placeholder="First Name" required><br>
                <input type="text" name="lastName" id="lastName" placeholder="Last Name" required><br>
                <input type="text" name="companyName" id="companyName" placeholder="Company Name" required><br>
                <input type="email" name="email" id="email" placeholder="Email" required><br>
                <input type="tel" name="phoneNumber" id="phoneNumber" placeholder="(123)456-7890" required><br>
                <textarea id="message" placeholder="Enter Message" rows="5" cols="50" required></textarea><br>
                <fieldset>
                <legend>Best Contact Time</legend>
                <input type="radio" name="contactTime" id="contactTimeAny" value="any" checked><label for="contactTimeAny">Any</label><br>
                <input type="radio" name="contactTime" id="contactTimeAM" value="AM"><label for="contactTimeAM">AM</label><br>
                <input type="radio" name="contactTime" id="contactTimePM" value="PM"><label for="contactTimePM">PM</label><br>
                <label for="contactOption">How should I contact you</label><br>
                </fieldset>
                <select name="contactOption" id="contactOption" required>
                    <option value="default">Select an option</option>
                    <option value="selectPhone">Phone</option>
                    <option value="selectEmail">Email</option>
                    <option value="selectText">Text</option>
                </select><br>
                
                <input type="submit" name="submit" id="submit">
            </form>
        </div>
        <hr>
        <footer>
            <h3>Multimedia</h3>
            <img src="image.png" alt="Picture of grey icon on grey background"><br>
            <audio src="speech.mp3" controls>Update browser audio element in use.</audio>
            <video src="shenzen.mp4" controls style="width:99%"></video>
        </footer>
    </main>
    
</body>
</html>
